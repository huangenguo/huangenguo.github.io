<!-- 悬浮按钮 - 返回顶部/跳转底部 -->
<button id="floating-jump-btn" class="floating-jump-btn" title="跳转">
  <span class="floating-jump-btn__icon">↓</span>
</button>

<style>
.floating-jump-btn {
  position: fixed;
  bottom: 30px;
  right: 30px;
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: #4e91a5;
  color: #fff;
  border: none;
  cursor: pointer;
  transition: all 0.3s ease;
  z-index: 9999;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
}

.floating-jump-btn:hover {
  background: #3d7a8c;
  transform: translateY(-2px);
}

.floating-jump-btn:active {
  transform: translateY(0);
}

.floating-jump-btn__icon {
  display: block;
  line-height: 1;
}

@media (max-width: 768px) {
  .floating-jump-btn {
    width: 56px;
    height: 56px;
    bottom: 24px;
    right: 24px;
    font-size: 20px;
  }
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
  var jumpBtn = document.getElementById('floating-jump-btn');
  var lastScrollTop = 0;
  var isAtBottom = false;
  var isAtTop = true;

  // 节流函数
  function throttle(func, limit) {
    var inThrottle;
    return function() {
      var args = arguments;
      var context = this;
      if (!inThrottle) {
        func.apply(context, args);
        inThrottle = true;
        setTimeout(function() {
          inThrottle = false;
        }, limit);
      }
    };
  }

  // 更新按钮图标状态
  function updateButtonIcon() {
    var scrollTop = window.pageYOffset || document.documentElement.scrollTop;
    var docHeight = document.documentElement.scrollHeight;
    var winHeight = window.innerHeight;
    var scrollBottom = scrollTop + winHeight;

    // 判断是否到达顶部或底部
    isAtTop = scrollTop <= 10;
    isAtBottom = scrollBottom >= docHeight - 10;

    var icon = jumpBtn.querySelector('.floating-jump-btn__icon');

    // 在顶部时显示向下箭头（可去底部）
    if (isAtTop) {
      icon.innerHTML = '↓';
    }
    // 在底部时显示向上箭头（可回顶部）
    else if (isAtBottom) {
      icon.innerHTML = '↑';
    }
    // 根据滚动方向切换图标
    else {
      if (scrollTop > lastScrollTop) {
        // 向下滚动，显示向下箭头（可去底部）
        icon.innerHTML = '↓';
      } else {
        // 向上滚动，显示向上箭头（可回顶部）
        icon.innerHTML = '↑';
      }
    }

    lastScrollTop = scrollTop;
  }

  // 使用节流处理滚动事件，间隔120ms
  var throttledScrollHandler = throttle(updateButtonIcon, 120);
  window.addEventListener('scroll', throttledScrollHandler);

  // 初始化按钮状态
  updateButtonIcon();

  // 点击按钮根据当前图标决定跳转方向
  jumpBtn.addEventListener('click', function() {
    var icon = jumpBtn.querySelector('.floating-jump-btn__icon');
    var currentIcon = icon.innerHTML;

    if (currentIcon === '↑') {
      // 向上箭头表示回顶部
      window.scrollTo({
        top: 0,
        behavior: 'smooth'
      });
    } else {
      // 向下箭头表示去底部
      var footer = document.getElementById('footer');
      if (footer) {
        footer.scrollIntoView({ behavior: 'smooth' });
      } else {
        window.scrollTo({
          top: document.documentElement.scrollHeight,
          behavior: 'smooth'
        });
      }
    }
  });
});
</script>
