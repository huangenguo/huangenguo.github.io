<div class="popular-posts">
  <h3 class="popular-posts__title">
    <i class="fas fa-fire" aria-hidden="true"></i> 热门文章
  </h3>
  <ul class="popular-posts__list" id="popular-posts-list">
    <li class="popular-posts__loading">加载中...</li>
  </ul>
</div>

<style>
.popular-posts {
  margin: 0.75rem 0;
  padding: 0.75rem;
  background: #f2f3f3;
  border-radius: 4px;
}

.popular-posts__title {
  margin: 0 0 0.4rem 0;
  font-size: 0.8rem;
  font-weight: 600;
  color: #3d4144;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.popular-posts__title i {
  color: #e74c3c;
  margin-right: 0.4rem;
  font-size: 0.8rem;
}

.popular-posts__list {
  list-style: none;
  margin: 0;
  padding: 0;
  display: flex;
  flex-wrap: wrap;
  gap: 0.3rem 1rem;
}

.popular-posts__loading,
.popular-posts__empty {
  color: #9ba1a6;
  font-size: 0.8rem;
  font-style: italic;
}

.popular-posts__item {
  margin: 0;
  flex: 1;
  min-width: 200px;
  max-width: calc(50% - 0.75rem);
}

.popular-posts__link {
  display: flex;
  align-items: center;
  text-decoration: none;
  color: inherit;
  transition: color 0.2s ease;
  padding: 0.15rem 0;
}

.popular-posts__link:hover {
  color: #2a76dd;
}

.popular-posts__link:hover .popular-posts__name {
  color: #2a76dd;
}

.popular-posts__rank {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 18px;
  height: 18px;
  background: #f2f3f3;
  color: #7a8288;
  border-radius: 3px;
  font-size: 0.7rem;
  font-weight: 600;
  margin-right: 0.5rem;
  flex-shrink: 0;
}

.popular-posts__item:nth-child(1) .popular-posts__rank {
  background: #e74c3c;
  color: white;
}

.popular-posts__item:nth-child(2) .popular-posts__rank {
  background: #f39c12;
  color: white;
}

.popular-posts__item:nth-child(3) .popular-posts__rank {
  background: #f1c40f;
  color: #3d4144;
}

.popular-posts__content {
  display: flex;
  flex-direction: column;
  flex: 1;
  min-width: 0;
}

.popular-posts__name {
  font-weight: 400;
  color: #3d4144;
  line-height: 1.3;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-size: 0.85rem;
  transition: color 0.2s ease;
}

.popular-posts__meta {
  font-size: 0.7rem;
  color: #9ba1a6;
  margin-top: 0.1rem;
}

.popular-posts__meta i {
  margin-right: 0.25rem;
  font-size: 0.65rem;
}

@media (max-width: 768px) {
  .popular-posts__item {
    max-width: 100%;
  }
}
</style>

<script>
const allPostsForPopular = [
  {% for post in site.posts %}
    {
      title: "{{ post.title | escape }}",
      url: "{{ post.url | relative_url }}",
      date: "{{ post.date | date: '%Y-%m-%d' }}"
    }{% unless forloop.last %},{% endunless %}
  {% endfor %}
];

document.addEventListener('DOMContentLoaded', function() {
  if (typeof twikoo === 'undefined') {
    setTimeout(initPopularPosts, 2000);
  } else {
    initPopularPosts();
  }
});

function initPopularPosts() {
  if (typeof twikoo === 'undefined') {
    document.getElementById('popular-posts-list').innerHTML = 
      '<li class="popular-posts__empty">评论系统加载中...</li>';
    return;
  }

  const promises = allPostsForPopular.map(function(post) {
    return twikoo.getCommentsCount({
      envId: 'https://twikoo.616161.best',
      urls: [post.url]
    }).then(function(response) {
      return {
        title: post.title,
        url: post.url,
        date: post.date,
        count: response.data[0] || 0
      };
    }).catch(function() {
      return {
        title: post.title,
        url: post.url,
        date: post.date,
        count: 0
      };
    });
  });

  Promise.all(promises).then(function(results) {
    const sortedPosts = results
      .filter(function(post) { return post.count > 0; })
      .sort(function(a, b) { return b.count - a.count; })
      .slice(0, 5);

    if (sortedPosts.length === 0) {
      const recentPosts = allPostsForPopular
        .slice(0, 5)
        .map(function(post) {
          return {
            title: post.title,
            url: post.url,
            date: post.date,
            count: 0
          };
        });
      renderPopularPosts(recentPosts, true);
    } else {
      renderPopularPosts(sortedPosts, false);
    }
  }).catch(function(error) {
    console.error('获取热门文章失败:', error);
    document.getElementById('popular-posts-list').innerHTML = 
      '<li class="popular-posts__empty">加载失败</li>';
  });
}

function renderPopularPosts(posts, isRecent) {
  const html = posts.map(function(post, index) {
    const countText = isRecent 
      ? '<i class="far fa-calendar-alt"></i> ' + post.date
      : '<i class="far fa-comment"></i> ' + post.count;
    
    return '<li class="popular-posts__item">' +
      '<a href="' + post.url + '" class="popular-posts__link">' +
        '<span class="popular-posts__rank">' + (index + 1) + '</span>' +
        '<div class="popular-posts__content">' +
          '<span class="popular-posts__name">' + post.title + '</span>' +
          '<span class="popular-posts__meta">' + countText + '</span>' +
        '</div>' +
      '</a>' +
    '</li>';
  }).join('');
  
  document.getElementById('popular-posts-list').innerHTML = html;
}
</script>
