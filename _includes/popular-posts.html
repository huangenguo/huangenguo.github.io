<div class="popular-posts">
  <h3 class="popular-posts__title">
    <i class="fas fa-fire" aria-hidden="true"></i> 热门文章
  </h3>
  <ul class="popular-posts__list" id="popular-posts-list">
    <li class="popular-posts__loading">加载中...</li>
  </ul>
</div>

<style>
.popular-posts {
  margin: 2em 0;
  padding: 1em;
  background: #f8f9fa;
  border-radius: 8px;
}

.popular-posts__title {
  margin: 0 0 1em 0;
  font-size: 1.1em;
  color: #333;
  border-bottom: 2px solid #e74c3c;
  padding-bottom: 0.5em;
}

.popular-posts__title i {
  color: #e74c3c;
  margin-right: 0.5em;
}

.popular-posts__list {
  list-style: none;
  margin: 0;
  padding: 0;
}

.popular-posts__loading,
.popular-posts__empty {
  text-align: center;
  color: #7f8c8d;
  padding: 1em;
}

.popular-posts__item {
  margin: 0.8em 0;
}

.popular-posts__link {
  display: flex;
  align-items: flex-start;
  text-decoration: none;
  color: inherit;
  transition: background 0.2s;
  padding: 0.5em;
  border-radius: 4px;
}

.popular-posts__link:hover {
  background: rgba(0,0,0,0.05);
}

.popular-posts__rank {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 24px;
  height: 24px;
  background: #ddd;
  color: #666;
  border-radius: 4px;
  font-size: 0.85em;
  font-weight: bold;
  margin-right: 0.8em;
  flex-shrink: 0;
}

.popular-posts__item:nth-child(1) .popular-posts__rank {
  background: #e74c3c;
  color: white;
}

.popular-posts__item:nth-child(2) .popular-posts__rank {
  background: #f39c12;
  color: white;
}

.popular-posts__item:nth-child(3) .popular-posts__rank {
  background: #f1c40f;
  color: #333;
}

.popular-posts__content {
  display: flex;
  flex-direction: column;
  flex: 1;
  min-width: 0;
}

.popular-posts__name {
  font-weight: 500;
  color: #2c3e50;
  line-height: 1.4;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.popular-posts__meta {
  font-size: 0.8em;
  color: #7f8c8d;
  margin-top: 0.2em;
}

.popular-posts__meta i {
  margin-right: 0.3em;
}
</style>

<script>
const allPostsForPopular = [
  {% for post in site.posts %}
    {
      title: "{{ post.title | escape }}",
      url: "{{ post.url | relative_url }}",
      date: "{{ post.date | date: '%Y-%m-%d' }}"
    }{% unless forloop.last %},{% endunless %}
  {% endfor %}
];

document.addEventListener('DOMContentLoaded', function() {
  if (typeof twikoo === 'undefined') {
    setTimeout(initPopularPosts, 2000);
  } else {
    initPopularPosts();
  }
});

function initPopularPosts() {
  if (typeof twikoo === 'undefined') {
    document.getElementById('popular-posts-list').innerHTML = 
      '<li class="popular-posts__empty">评论系统加载中...</li>';
    return;
  }

  const promises = allPostsForPopular.map(function(post) {
    return twikoo.getCommentsCount({
      envId: 'https://twikoo.616161.best',
      urls: [post.url]
    }).then(function(response) {
      return {
        title: post.title,
        url: post.url,
        date: post.date,
        count: response.data[0] || 0
      };
    }).catch(function() {
      return {
        title: post.title,
        url: post.url,
        date: post.date,
        count: 0
      };
    });
  });

  Promise.all(promises).then(function(results) {
    const sortedPosts = results
      .filter(function(post) { return post.count > 0; })
      .sort(function(a, b) { return b.count - a.count; })
      .slice(0, 5);

    if (sortedPosts.length === 0) {
      const recentPosts = allPostsForPopular
        .slice(0, 5)
        .map(function(post) {
          return {
            title: post.title,
            url: post.url,
            date: post.date,
            count: 0
          };
        });
      renderPopularPosts(recentPosts, true);
    } else {
      renderPopularPosts(sortedPosts, false);
    }
  }).catch(function(error) {
    console.error('获取热门文章失败:', error);
    document.getElementById('popular-posts-list').innerHTML = 
      '<li class="popular-posts__empty">加载失败</li>';
  });
}

function renderPopularPosts(posts, isRecent) {
  const html = posts.map(function(post, index) {
    const countText = isRecent 
      ? '<i class="far fa-calendar-alt"></i> ' + post.date
      : '<i class="far fa-comment"></i> ' + post.count + ' 条评论';
    
    return '<li class="popular-posts__item">' +
      '<a href="' + post.url + '" class="popular-posts__link">' +
        '<span class="popular-posts__rank">' + (index + 1) + '</span>' +
        '<div class="popular-posts__content">' +
          '<span class="popular-posts__name">' + post.title + '</span>' +
          '<span class="popular-posts__meta">' + countText + '</span>' +
        '</div>' +
      '</a>' +
    '</li>';
  }).join('');
  
  document.getElementById('popular-posts-list').innerHTML = html;
}
</script>
